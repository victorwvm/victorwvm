name: GitHub Stats
 
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: ["master", "main"]
  workflow_dispatch:     
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: jstrieb/github-stats@master
        with:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
